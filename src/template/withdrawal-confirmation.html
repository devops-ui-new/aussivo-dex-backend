<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;padding:0;background:#0a0f1a;font-family:'Segoe UI',Arial,sans-serif;color:#e2e8f0}
.container{max-width:560px;margin:0 auto;padding:40px 20px}
.card{background:linear-gradient(135deg,#111827 0%,#0b1121 100%);border:1px solid rgba(0,230,118,0.1);border-radius:16px;padding:40px}
.logo{font-size:24px;font-weight:800;color:#fff;text-align:center;margin-bottom:24px}
.logo span{color:#00e676}
.status-box{border-radius:12px;padding:20px;text-align:center;margin:24px 0}
.approved{background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2)}
.rejected{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2)}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px}
.detail-label{color:#64748b}
.detail-value{color:#e2e8f0;font-weight:600}
.text{color:#94a3b8;font-size:14px;line-height:1.6}
.footer{text-align:center;padding:20px;color:#475569;font-size:12px}
</style></head>
<body><div class="container"><div class="card">
<div class="logo">Aussivo<span>.DEX</span></div>
<h2 style="color:#fff;font-size:20px;text-align:center">Withdrawal {{status}}</h2>
<div class="status-box {{statusClass}}">
<p style="font-size:24px;margin:0 0 8px">{{statusIcon}}</p>
<p style="font-size:18px;font-weight:700;color:#fff;margin:0">${{amount}} {{asset}}</p>
<p style="color:#64748b;font-size:13px;margin:4px 0 0">{{statusMessage}}</p>
</div>
<div style="margin:20px 0">
<div class="detail-row"><span class="detail-label">To Wallet</span><span class="detail-value">{{walletShort}}</span></div>
{{#if txHash}}<div class="detail-row"><span class="detail-label">Tx Hash</span><span class="detail-value">{{txHashShort}}</span></div>{{/if}}
<div class="detail-row" style="border:none"><span class="detail-label">Date</span><span class="detail-value">{{date}}</span></div>
</div>
</div>
<div class="footer">© 2026 Aussivo.DEX · Transparent. Permissionless. Non-Custodial.</div>
</div></body></html>
