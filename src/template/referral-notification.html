<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;padding:0;background:#0a0f1a;font-family:'Segoe UI',Arial,sans-serif;color:#e2e8f0}
.container{max-width:560px;margin:0 auto;padding:40px 20px}
.card{background:linear-gradient(135deg,#111827 0%,#0b1121 100%);border:1px solid rgba(0,230,118,0.1);border-radius:16px;padding:40px;text-align:center}
.logo{font-size:24px;font-weight:800;color:#fff;margin-bottom:24px}
.logo span{color:#00e676}
.text{color:#94a3b8;font-size:14px;line-height:1.6}
.amount{font-size:28px;font-weight:800;color:#00e676;margin:16px 0}
.badge{display:inline-block;background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);border-radius:100px;padding:6px 16px;font-size:13px;color:#00e676;font-weight:600}
.footer{text-align:center;padding:20px;color:#475569;font-size:12px}
</style></head>
<body><div class="container"><div class="card">
<div class="logo">Aussivo<span>.DEX</span></div>
<h2 style="color:#fff;font-size:20px">🤝 Referral Commission Earned!</h2>
<p class="text">You earned a commission from your Level {{level}} referral's yield.</p>
<div class="amount">+${{amount}} {{asset}}</div>
<div class="badge">Level {{level}} · {{percent}}% Commission</div>
<p class="text" style="margin-top:20px">From: {{referredUserEmail}}</p>
</div>
<div class="footer">© 2026 Aussivo.DEX · Transparent. Permissionless. Non-Custodial.</div>
</div></body></html>
